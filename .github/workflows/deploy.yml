name: Deploy HubFutebol

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hubfutebol-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64, hubfutebol]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show commit
        run: |
          echo "Deploying commit: $GITHUB_SHA"
          git rev-parse --short HEAD

      - name: Deploy with rollback
        shell: bash
        run: |
          set -Eeuo pipefail

          APP_DIR="/home/frederico/HubFutebol"
          cd "$APP_DIR"

          PREV_COMMIT="$(git rev-parse HEAD)"
          echo "PREV_COMMIT=$PREV_COMMIT"
          echo "NEW_COMMIT=$GITHUB_SHA"

          rollback() {
            echo "=== DEPLOY FALHOU - INICIANDO ROLLBACK ==="
            cd "$APP_DIR"
            git fetch --all --prune || true
            git reset --hard "$PREV_COMMIT" || true
            docker compose up -d --build || true
            sleep 8
            curl -fsSI http://127.0.0.1:8080 || true
            curl -fksSI https://servidor-openclaw.tail5ef8ad.ts.net || true
            echo "=== ROLLBACK FINALIZADO ==="
          }

          trap rollback ERR

          git fetch --all --prune
          git reset --hard "$GITHUB_SHA"

          docker compose config >/tmp/hubfutebol-compose-rendered.yml
          docker compose up -d --build

          sleep 8

          curl -fsSI http://127.0.0.1:8080
          curl -fksSI https://servidor-openclaw.tail5ef8ad.ts.net

          echo "=== DEPLOY OK ==="

      - name: Show running revision
        shell: bash
        run: |
          cd /home/frederico/HubFutebol
          git rev-parse HEAD
